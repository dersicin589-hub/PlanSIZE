<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e293b">
    <title>Günlük Planım</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #1e3a8a 100%); color: #fff; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: rgba(15, 23, 42, 0.9); padding: 25px; border-radius: 15px; margin-bottom: 30px; border: 2px solid rgba(59, 130, 246, 0.4); }
        h1 { font-size: 32px; margin-bottom: 8px; color: #fff; }
        .date-info { color: #93c5fd; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }
        .card { background: rgba(30, 41, 59, 0.85); border: 2px solid rgba(59, 130, 246, 0.3); border-radius: 15px; padding: 25px; }
        h2, h3 { margin-bottom: 15px; font-size: 18px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"], textarea, input[type="date"] { padding: 12px 15px; border: 2px solid rgba(59, 130, 246, 0.3); background: #1e293b; color: #fff; border-radius: 8px; font-family: inherit; font-size: 14px; }
        input[type="text"]:focus, textarea:focus, input[type="date"]:focus { outline: none; border-color: #3b82f6; }
        button { padding: 12px 20px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4); }
        button:active { transform: translateY(0); }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat { text-align: center; background: rgba(59, 130, 246, 0.1); padding: 15px; border-radius: 8px; border: 1px solid rgba(59, 130, 246, 0.2); }
        .stat-num { font-size: 28px; font-weight: bold; color: #3b82f6; }
        .stat-label { font-size: 12px; color: #93c5fd; margin-top: 5px; }
        .progress-bar { width: 100%; height: 10px; background: #334155; border-radius: 5px; overflow: hidden; margin-bottom: 20px; border: 1px solid rgba(59, 130, 246, 0.2); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #06b6d4); transition: width 0.3s ease; }
        .task { background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(59, 130, 246, 0.2); padding: 15px; border-radius: 8px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
        .task-btn { padding: 8px 12px; min-width: 45px; font-size: 14px; border-radius: 6px; }
        .task-text { flex: 1; font-weight: 500; }
        .task.completed .task-text { text-decoration: line-through; color: #4ade80; }
        .task.failed .task-text { text-decoration: line-through; color: #f87171; }
        .delete-btn { padding: 8px; background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        .delete-btn:hover { background: rgba(239, 68, 68, 0.4); }
        .empty { text-align: center; padding: 40px 20px; color: #64748b; }
        .notes-area { background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(59, 130, 246, 0.2); padding: 15px; border-radius: 8px; min-height: 180px; white-space: pre-wrap; word-break: break-word; margin-bottom: 15px; }
        .date-input { width: 100%; margin-bottom: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📔 Günlük Planım</h1>
            <p class="date-info" id="dateDisplay"></p>
        </header>

        <div class="grid">
            <div>
                <div class="card">
                    <h2>📊 Günlük İlerleme</h2>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-num" id="pendingCount">0</div>
                            <div class="stat-label">Beklemede</div>
                        </div>
                        <div class="stat">
                            <div class="stat-num" id="completedCount">0</div>
                            <div class="stat-label">Tamamlanan</div>
                        </div>
                        <div class="stat">
                            <div class="stat-num" id="failedCount">0</div>
                            <div class="stat-label">Yapılamayan</div>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: 25px;">
                    <h3>Yeni Görev Ekle</h3>
                    <div class="input-group">
                        <input type="text" id="newTask" placeholder="Yapacağın şeyi yazınız..." />
                        <button onclick="addTask()">➕ Ekle</button>
                    </div>
                    <div id="tasksList"></div>
                </div>
            </div>

            <div>
                <div class="card">
                    <h3>📅 Tarih Seç</h3>
                    <input type="date" class="date-input" id="dateInput" onchange="changeDate()" />

                    <h3>📈 Başarı Oranı</h3>
                    <div class="stat" style="background: rgba(59, 130, 246, 0.15); border: 2px solid rgba(59, 130, 246, 0.3); padding: 20px;">
                        <div class="stat-num" id="percentage">0%</div>
                    </div>

                    <h3 style="margin-top: 25px;">📝 Günün Notları</h3>
                    <textarea id="notesInput" placeholder="Günün nasıl geçti? Neler öğrendin?" style="width: 100%; height: 200px; margin-bottom: 10px;"></textarea>
                    <button onclick="saveNotes()" style="width: 100%;">💾 Kaydet</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let dailyPlans = JSON.parse(localStorage.getItem('dailyPlans')) || {};
        let currentDate = new Date().toISOString().split('T')[0];

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            const days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
            const months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
            return `${days[date.getDay()]}, ${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
        }

        function loadDay() {
            document.getElementById('dateInput').value = currentDate;
            document.getElementById('dateDisplay').textContent = formatDate(currentDate);
            if (!dailyPlans[currentDate]) {
                dailyPlans[currentDate] = { tasks: [], notes: '' };
            }
            document.getElementById('notesInput').value = dailyPlans[currentDate].notes || '';
            renderTasks();
        }

        function changeDate() {
            currentDate = document.getElementById('dateInput').value;
            loadDay();
        }

        function addTask() {
            const text = document.getElementById('newTask').value.trim();
            if (!text) return;
            if (!dailyPlans[currentDate].tasks) dailyPlans[currentDate].tasks = [];
            dailyPlans[currentDate].tasks.push({ id: Date.now(), text, status: null });
            document.getElementById('newTask').value = '';
            savePlans();
            renderTasks();
        }

        function updateTask(id, status) {
            const task = dailyPlans[currentDate].tasks.find(t => t.id === id);
            if (task) task.status = task.status === status ? null : status;
            savePlans();
            renderTasks();
        }

        function deleteTask(id) {
            dailyPlans[currentDate].tasks = dailyPlans[currentDate].tasks.filter(t => t.id !== id);
            savePlans();
            renderTasks();
        }

        function renderTasks() {
            const tasks = dailyPlans[currentDate].tasks || [];
            const completed = tasks.filter(t => t.status === 'completed').length;
            const failed = tasks.filter(t => t.status === 'failed').length;
            const pending = tasks.filter(t => !t.status).length;
            const total = tasks.length;
            const percentage = total ? Math.round((completed / total) * 100) : 0;

            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('failedCount').textContent = failed;
            document.getElementById('percentage').textContent = percentage + '%';
            document.getElementById('progressFill').style.width = percentage + '%';

            const list = document.getElementById('tasksList');
            if (tasks.length === 0) {
                list.innerHTML = '<div class="empty">📝 Henüz görev eklenmedi</div>';
                return;
            }

            list.innerHTML = tasks.map(task => `
                <div class="task ${task.status || ''}">
                    <button class="task-btn" onclick="updateTask(${task.id}, 'completed')" style="background: ${task.status === 'completed' ? '#22c55e' : 'rgba(59, 130, 246, 0.3)'}; color: ${task.status === 'completed' ? '#fff' : '#93c5fd'};">✓</button>
                    <button class="task-btn" onclick="updateTask(${task.id}, 'failed')" style="background: ${task.status === 'failed' ? '#ef4444' : 'rgba(59, 130, 246, 0.3)'}; color: ${task.status === 'failed' ? '#fff' : '#93c5fd'};">✕</button>
                    <span class="task-text">${task.text}</span>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">🗑️</button>
                </div>
            `).join('');
        }

        function saveNotes() {
            dailyPlans[currentDate].notes = document.getElementById('notesInput').value;
            savePlans();
            alert('✅ Notlar kaydedildi!');
        }

        function savePlans() {
            localStorage.setItem('dailyPlans', JSON.stringify(dailyPlans));
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        loadDay();
    </script>
</body>
</html>
